name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: fiend-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: fiend-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: fiend-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: fiend-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: fiend-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash
      - name: Rename binary
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv target/${{ matrix.target }}/release/fiend.exe ${{ matrix.name }}
          else
            mv target/${{ matrix.target }}/release/fiend ${{ matrix.name }}
          fi
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: fiend-*
